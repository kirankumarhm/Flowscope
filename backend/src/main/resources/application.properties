spring.application.name=flowscope-web
flowscope.version=@project.version@
server.port=${PORT:8080}

# --- CORS ------------------------------------------------------------------
# This is a pure REST API; the React SPA is built and served separately.
# Comma-separated list of allowed browser origins (Vite dev server by default).
flowscope.cors.allowed-origins=http://localhost:5173

# --- Request/response sizing & timeouts ------------------------------------
# Analysis responses can be large; workspace scans can be slow.
server.tomcat.max-http-response-header-size=64KB
server.tomcat.max-swallow-size=10MB
spring.mvc.async.request-timeout=190000

# Compress large JSON diagram payloads over the wire.
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/css,application/javascript
server.compression.min-response-size=2KB

# --- Graceful shutdown -----------------------------------------------------
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=25s

# --- Error responses -------------------------------------------------------
# Never leak stack traces; GlobalExceptionHandler returns a clean JSON body.
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=never

# --- Actuator (production observability) -----------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true
info.app.name=FlowScope
info.app.description=Reverse-engineering diagram tool

# --- OpenAPI / Swagger UI --------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.packages-to-scan=com.flowscope.controller

# --- Logging ---------------------------------------------------------------
logging.level.root=INFO
logging.level.com.flowscope=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n
